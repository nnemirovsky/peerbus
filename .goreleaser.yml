version: 2

builds:
  # peerbus ships as ONE multi-command binary (git/kubectl style): subcommands
  # `serve`, `audit verify`, and `adapter --adapter=<mode>` select the role at
  # runtime. Pure-Go (modernc.org/sqlite) so CGO_ENABLED=0 cross-compiles
  # every target from a single linux runner.
  - id: peerbus
    main: ./cmd/peerbus
    binary: peerbus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/nnemirovsky/peerbus/internal/version.Version={{ .Version }}

archives:
  # Single static binary — no archive wrapping. Users grab the raw binary,
  # chmod +x, and run it. Matches the sluice release style; no LICENSE/README
  # bundling because the binary is the artifact and both files are already in
  # the repo / release notes. name_template intentionally omits the version
  # (sluice convention) so `latest/download/peerbus_<os>_<arch>` always works.
  - id: peerbus
    ids:
      - peerbus
    formats:
      - binary
    name_template: "peerbus_{{ .Os }}_{{ .Arch }}"

changelog:
  disable: true

release:
  github:
    owner: nnemirovsky
    name: peerbus
