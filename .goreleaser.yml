version: 2

builds:
  # peerbus ships as ONE multi-command binary (git/kubectl style): subcommands
  # `serve`, `audit verify`, and `adapter --adapter=<mode>` select the role at
  # runtime. Pure-Go (modernc.org/sqlite) so CGO_ENABLED=0 cross-compiles
  # every target from a single linux runner.
  - id: peerbus
    main: ./cmd/peerbus
    binary: peerbus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/nnemirovsky/peerbus/internal/version.Version={{ .Version }}

archives:
  # One archive per os/arch bundling the single binary plus LICENSE + README.
  - id: peerbus
    ids:
      - peerbus
    formats:
      - tar.gz
    name_template: "peerbus_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

changelog:
  disable: true

release:
  github:
    owner: nnemirovsky
    name: peerbus
