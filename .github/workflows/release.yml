name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Single job: peerbus is pure-Go (modernc.org/sqlite, no cgo), so goreleaser
  # cross-compiles all four targets (linux/darwin x amd64/arm64) with
  # CGO_ENABLED=0 from one ubuntu runner. No arm64 gcc, no separate macOS job.
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
